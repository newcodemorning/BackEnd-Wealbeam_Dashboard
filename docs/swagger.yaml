components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    IdParam:
      name: id
      in: path
      required: true
      schema:
        type: string
        pattern: "^[0-9a-fA-F]{24}$"
      example: 507f1f77bcf86cd799439011

    PageParam:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1

    LimitParam:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 10

  responses:
    UnauthorizedError:
      description: Authentication required
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                example: Unauthorized

    ForbiddenError:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                example: Forbidden

    NotFoundError:
      description: Resource not found
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                example: Resource not found

    ValidationError:
      description: Validation error
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
              details:
                type: array
                items:
                  type: object
                  properties:
                    field:
                      type: string
                    message:
                      type: string

    BadRequestError:
      description: Bad request
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
              message:
                type: string

  schemas:
    # ==================== Core Models ====================
    User:
      type: object
      properties:
        _id:
          type: string
          example: 507f1f77bcf86cd799439011
        email:
          type: string
          format: email
        role:
          type: string
          enum: [super-admin, school, teacher, student, parent]
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    MultilingualText:
      type: object
      properties:
        en:
          type: string
        ar:
          type: string
      required: [en]

    # ==================== Super Admin ====================
    SuperAdmin:
      type: object
      properties:
        _id:
          type: string
        user:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        phone:
          type: string
        photo:
          type: string
        createdAt:
          type: string
          format: date-time

    CreateSuperAdminRequest:
      type: object
      required: [email, password, firstName, lastName]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
        firstName:
          type: string
        lastName:
          type: string
        phone:
          type: string

    UpdateSuperAdminRequest:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        phone:
          type: string
        photo:
          type: string
          format: binary

    # ==================== School ====================
    School:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
        address:
          type: string
        phone:
