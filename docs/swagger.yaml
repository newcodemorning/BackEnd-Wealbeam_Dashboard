openapi: 3.0.3
info:
  title: WeAllBeam API
  description: |
    Educational management system API for schools, teachers, students, and parents.

    ## Language Support
    API supports multilingual content. Use language prefix in URLs:
    - English: `/en/endpoint`
    - Arabic: `/ar/endpoint`
  version: "5.10.23"


servers:
  - url: http://localhost:4000/ar
    description: Development server (arabic)
  - url: http://localhost:4000/en
    description: Development server (english)
  - url: https://api.weallbeam.com/ar
    description: Production server (arabic)
  - url: https://api.weallbeam.com/en
    description: Production server (english)

security:
  - bearerAuth: []

tags:
  - name: Authentication
    description: User authentication and authorization
  - name: Profile
    description: User profile management
  - name: Schools
    description: School management
  - name: Teachers
    description: Teacher management
  - name: Students
    description: Student management
  - name: Parents
    description: Parent management
  - name: Classes
    description: Class management
  - name: Questions
    description: Forms and questions management
  - name: Responses
    description: Student responses and assessments
  - name: Blog
    description: Blog post management
  - name: PDF
    description: PDF resource management
  - name: Tickets
    description: Support ticket system
  - name: Incidents
    description: Incident reporting
  - name: Forum
    description: Community forum
  - name: FAQ
    description: Frequently asked questions
  - name: Contacts
    description: Contact messages
  - name: Super Admin
    description: Super administrator functions
  - name: Filter
    description: Data filtering endpoints

paths:
  # ==================== Authentication ====================
  /auth/login:
    post:
      tags: [Authentication]
      summary: User login
      description: Authenticate user with email and password
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                  example: admin@school.com
                password:
                  type: string
                  format: password
                  example: password123
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Login successful
                  id:
                    type: string
                    example: 507f1f77bcf86cd799439011
                  role:
                    type: string
                    enum: [super-admin, school, teacher, student, parent]
                  roleId:
                    type: string
                    example: 507f1f77bcf86cd799439012
                  token:
                    type: string
                    example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        "401":
          $ref: "#/components/responses/UnauthorizedError"

  /auth/password/reset:
    post:
      tags: [Authentication]
      summary: Change password
      description: Change user password (requires authentication)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [currentPassword, newPassword]
              properties:
                currentPassword:
                  type: string
                  format: password
                newPassword:
                  type: string
                  format: password
                  minLength: 6
      responses:
        "200":
          description: Password changed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Password changed successfully
        "400":
          $ref: "#/components/responses/BadRequestError"

  # ==================== Profile ====================
  /profile:
    get:
      tags: [Profile]
      summary: Get user profile
      description: Get current user's profile information based on role
      responses:
        "200":
          description: Profile information
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileResponse"
        "404":
          $ref: "#/components/responses/NotFoundError"

    put:
      tags: [Profile]
      summary: Update user profile
      description: Update current user's profile information
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                firstName:
                  type: string
                lastName:
                  type: string
                phone:
                  type: string
                photo:
                  type: string
                  format: binary
      responses:
        "200":
          description: Profile updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileResponse"

  # ==================== Super Admin ====================
  /super-admin:
    post:
      tags: [Super Admin]
      summary: Create super admin
      description: Create a new super admin account (super-admin only)
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/CreateSuperAdminRequest"
      responses:
        "201":
          description: Super admin created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuperAdmin"
        "400":
          $ref: "#/components/responses/ValidationError"

  /super-admin/{id}:
    get:
      tags: [Super Admin]
      summary: Get super admin by ID
      description: Get super admin details
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Super admin details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuperAdmin"
        "404":
          $ref: "#/components/responses/NotFoundError"

    put:
      tags: [Super Admin]
      summary: Update super admin
      description: Update super admin personal information
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/UpdateSuperAdminRequest"
      responses:
        "200":
          description: Super admin updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuperAdmin"

  /super-admin/{id}/change-password:
    patch:
      tags: [Super Admin]
      summary: Change super admin password
      description: Change super admin password
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [oldPassword, newPassword]
              properties:
                oldPassword:
                  type: string
                  format: password
                newPassword:
                  type: string
                  format: password
                  minLength: 6
      responses:
        "200":
          description: Password changed successfully

  # ==================== Schools ====================
  /school:
    post:
      tags: [Schools]
      summary: Create school
      description: Create a new school (super-admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSchoolRequest"
      responses:
        "201":
          description: School created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/School"
        "400":
          $ref: "#/components/responses/ValidationError"

    get:
      tags: [Schools]
      summary: List schools
      description: Get list of all schools (super-admin only)
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
      responses:
        "200":
          description: Schools list
          content:
            application/json:
              schema:
                type: object
                properties:
                  schools:
                    type: array
                    items:
                      $ref: "#/components/schemas/School"
                  pagination:
                    $ref: "#/components/schemas/Pagination"

  /school/{id}:
    get:
      tags: [Schools]
      summary: Get school by ID
      description: Get detailed information about a specific school
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: School details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/School"
        "404":
          $ref: "#/components/responses/NotFoundError"

    put:
      tags: [Schools]
      summary: Update school
      description: Update school information
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSchoolRequest"
      responses:
        "200":
          description: School updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/School"

    delete:
      tags: [Schools]
      summary: Delete school
      description: Delete a school and all related data
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: School deleted successfully
        "404":
          $ref: "#/components/responses/NotFoundError"

  # ==================== Teachers ====================
  /teachers:
    post:
      tags: [Teachers]
      summary: Create teacher
      description: Add a new teacher (super-admin, school only)
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/CreateTeacherRequest"
      responses:
        "201":
          description: Teacher created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Teacher"
        "400":
          $ref: "#/components/responses/ValidationError"

    get:
      tags: [Teachers]
      summary: List teachers
      description: Get list of teachers (school can see their teachers)
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
      responses:
        "200":
          description: Teachers list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Teacher"

  /teachers/{id}:
    get:
      tags: [Teachers]
      summary: Get teacher by ID
      description: Get teacher details
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Teacher details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Teacher"
        "404":
          $ref: "#/components/responses/NotFoundError"

    put:
      tags: [Teachers]
      summary: Update teacher
      description: Update teacher information
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/UpdateTeacherRequest"
      responses:
        "200":
          description: Teacher updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Teacher"

    delete:
      tags: [Teachers]
      summary: Delete teacher
      description: Delete a teacher
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Teacher deleted successfully

  /teachers/school/{schoolId}:
    get:
      tags: [Teachers]
      summary: Get teachers by school
      description: List teachers belonging to a specific school
      parameters:
        - name: schoolId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Teachers list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Teacher"

  /teachers/class/{classId}:
    get:
      tags: [Teachers]
      summary: Get teachers by class
      description: List teachers assigned to a specific class
      parameters:
        - name: classId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Teachers list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Teacher"

  # ==================== Students ====================
  /students:
    post:
      tags: [Students]
      summary: Create student
      description: Add a new student (super-admin, school, teacher only)
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/CreateStudentRequest"
      responses:
        "201":
          description: Student created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Student"
        "400":
          $ref: "#/components/responses/ValidationError"

    get:
      tags: [Students]
      summary: List students
      description: Get list of students
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
      responses:
        "200":
          description: Students list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Student"

  /students/{id}:
    get:
      tags: [Students]
      summary: Get student by ID
      description: Get student details
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Student details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Student"
        "404":
          $ref: "#/components/responses/NotFoundError"

    put:
      tags: [Students]
      summary: Update student
      description: Update student information
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/UpdateStudentRequest"
      responses:
        "200":
          description: Student updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Student"

    delete:
      tags: [Students]
      summary: Delete student
      description: Delete a student
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Student deleted successfully

  /students/class/{classId}:
    get:
      tags: [Students]
      summary: Get students by class
      description: List students in a specific class
      parameters:
        - name: classId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Students list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Student"

  /students/import:
    post:
      tags: [Students]
      summary: Import students from CSV
      description: Bulk import students from a CSV file
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: Students imported successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  imported:
                    type: integer
                  failed:
                    type: integer

  /students/export:
    get:
      tags: [Students]
      summary: Export students to CSV
      description: Export students data to a CSV file
      responses:
        "200":
          description: CSV file
          content:
            text/csv:
              schema:
                type: string
                format: binary

  # ==================== Parents ====================
  /parent/register:
    post:
      tags: [Parents]
      summary: Register parent
      description: Parent self-registration (no auth required)
      security: []
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/CreateParentRequest"
      responses:
        "201":
          description: Parent registered successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Parent"

  /parent:
    post:
      tags: [Parents]
      summary: Create parent
      description: Add a new parent (super-admin, school, teacher only)
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/CreateParentRequest"
      responses:
        "201":
          description: Parent created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Parent"

    get:
      tags: [Parents]
      summary: List parents
      description: Get list of parents
      responses:
        "200":
          description: Parents list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Parent"

  /parent/{id}:
    get:
      tags: [Parents]
      summary: Get parent by ID
      description: Get parent details
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Parent details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Parent"
        "404":
          $ref: "#/components/responses/NotFoundError"

    put:
      tags: [Parents]
      summary: Update parent
      description: Update parent information
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/UpdateParentRequest"
      responses:
        "200":
          description: Parent updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Parent"

    delete:
      tags: [Parents]
      summary: Delete parent
      description: Delete a parent (super-admin, school only)
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Parent deleted successfully

  # ==================== Classes ====================
  /classes:
    post:
      tags: [Classes]
      summary: Create class
      description: Create a new class (super-admin, school only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateClassRequest"
      responses:
        "201":
          description: Class created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Class"

    get:
      tags: [Classes]
      summary: List classes
      description: Get list of all classes
      responses:
        "200":
          description: Classes list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Class"

  /classes/{id}:
    get:
      tags: [Classes]
      summary: Get class by ID
      description: Get class details
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Class details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Class"

    put:
      tags: [Classes]
      summary: Update class
      description: Update class information
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateClassRequest"
      responses:
        "200":
          description: Class updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Class"

    delete:
      tags: [Classes]
      summary: Delete class
      description: Delete a class
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Class deleted successfully

  /classes/school/{schoolId}:
    get:
      tags: [Classes]
      summary: Get classes by school
      description: List classes belonging to a specific school
      parameters:
        - name: schoolId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Classes list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Class"

  /classes/{id}/teachers:
    post:
      tags: [Classes]
      summary: Add teacher to class
      description: Assign a teacher to a class
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [teacherId]
              properties:
                teacherId:
                  type: string
      responses:
        "200":
          description: Teacher added to class

    delete:
      tags: [Classes]
      summary: Remove teacher from class
      description: Remove a teacher from a class
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [teacherId]
              properties:
                teacherId:
                  type: string
      responses:
        "200":
          description: Teacher removed from class

  # ==================== Questions (Forms) ====================
  /questions:
    post:
      tags: [Questions]
      summary: Create form
      description: Create a new form with questions (super-admin, school only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFormRequest"
      responses:
        "201":
          description: Form created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Form"

    get:
      tags: [Questions]
      summary: List all forms
      description: Get list of all available forms
      responses:
        "200":
          description: Forms list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Form"

  /questions/daily:
    get:
      tags: [Questions]
      summary: Get daily form
      description: Get the daily assessment form for students
      responses:
        "200":
          description: Daily form
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Form"

  /questions/{subject}:
    get:
      tags: [Questions]
      summary: Get form by subject
      description: Get form by subject name
      parameters:
        - name: subject
          in: path
          required: true
          schema:
            type: string
          example: daily
      responses:
        "200":
          description: Form details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Form"

    put:
      tags: [Questions]
      summary: Update form by subject
      description: Update form questions and settings
      parameters:
        - name: subject
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateFormRequest"
      responses:
        "200":
          description: Form updated successfully

    delete:
      tags: [Questions]
      summary: Delete form by subject
      description: Delete a form
      parameters:
        - name: subject
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Form deleted successfully

  /questions/id/{id}:
    get:
      tags: [Questions]
      summary: Get form by ID
      description: Get form by MongoDB ID
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Form details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Form"

    put:
      tags: [Questions]
      summary: Update form by ID
      description: Update form by MongoDB ID
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateFormRequest"
      responses:
        "200":
          description: Form updated successfully

    delete:
      tags: [Questions]
      summary: Delete form by ID
      description: Delete form by MongoDB ID
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Form deleted successfully

  # ==================== Responses ====================
  /responses/submit:
    post:
      tags: [Responses]
      summary: Submit form response
      description: Submit answers to a form (students only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitResponseRequest"
      responses:
        "201":
          description: Response submitted successfully
        "208":
          description: Already submitted today
        "400":
          $ref: "#/components/responses/ValidationError"

  /responses/{id}:
    get:
      tags: [Responses]
      summary: Get school statistics
      description: Get response statistics for a school by date range
      parameters:
        - $ref: "#/components/parameters/IdParam"
        - name: fromDay
          in: query
          schema:
            type: string
            format: date
          example: "2024-01-01"
        - name: toDay
          in: query
          schema:
            type: string
            format: date
          example: "2024-01-31"
      responses:
        "200":
          description: School statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SchoolStatistics"

  /responses/daily/{id}:
    get:
      tags: [Responses]
      summary: Get daily statistics
      description: Get daily response statistics for a school
      parameters:
        - $ref: "#/components/parameters/IdParam"
        - name: fromDay
          in: query
          schema:
            type: string
            format: date
        - name: toDay
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Daily statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyStatistics"

  /responses/daily/pdf/{id}:
    get:
      tags: [Responses]
      summary: Get daily statistics PDF
      description: Generate and download daily statistics as PDF report
      parameters:
        - $ref: "#/components/parameters/IdParam"
        - name: fromDay
          in: query
          schema:
            type: string
